<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="/ui/appicon.png" />
  <title>Penguin Translate</title>
  <link rel="stylesheet" href="/ui/shared/ui.css" />
  <script type="module" src="/ui/app.js"></script>
  <style>
    /* ── shell layout: one column, fixed app bar + run bar, scrolling work area ── */
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── ONE application bar (replaces hub nav + the three per-iframe title bars) ── */
    .appbar {
      height: 46px; flex-shrink: 0; display: flex; align-items: center; gap: 14px;
      padding: 0 12px; background: var(--bg-raised); border-bottom: 1px solid var(--border); position: relative;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; color: var(--text-bright); white-space: nowrap; }
    .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .spacer { flex: 1; }
    /* App-bar buttons: "Overlay an app" (enters the overlay utility) + account stub. */
    .ghost { display: flex; align-items: center; gap: 7px; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12.5px; color: var(--muted); }
    .ghost:hover { color: var(--text); border-color: var(--border-strong); }
    .ghost.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .account { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px 11px 3px 4px; font-size: 12px; color: var(--text); }
    .account .av { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #5b8cff, #9a6bff); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; }
    .account .plan { font-size: 10px; color: var(--muted); border: 1px solid var(--border-strong); border-radius: 5px; padding: 1px 6px; line-height: 1.5; }
    .gear { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); font-size: 15px; line-height: 1; }
    .gear:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

    /* ── languages live INLINE in the app bar (one line, no wasted vertical space):
          "Speak EN → [JA ×][ZH ×][KO ×] [+]" — selections shown as abbreviations ── */
    .langbar-inline { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
    .langbar-inline .you { color: var(--muted); white-space: nowrap; }
    .langbar-inline .you b { color: var(--text); font-weight: 600; cursor: pointer; border-bottom: 1px dotted var(--border-strong); }
    .langbar-inline .arrow { color: #8fb0ff; }
    .langbar-inline .set { display: flex; align-items: center; gap: 6px; }
    .langbar-inline .lchip { display: flex; align-items: center; gap: 5px; background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 7px; padding: 3px 7px; color: var(--text-bright); font-size: 12px; }
    .langbar-inline .lchip .flag { font-size: 12px; }
    .langbar-inline .lchip .x { color: var(--faint); font-size: 11px; cursor: pointer; }
    .langbar-inline .lchip .x:hover { color: var(--err); }
    .langbar-inline .add { width: 26px; height: 26px; border-radius: 7px; border: 1px dashed var(--border-strong); color: var(--muted); display: flex; align-items: center; justify-content: center; background: transparent; font-size: 15px; }
    .langbar-inline .add:hover { color: var(--text); border-color: var(--accent); }
    .lmenu { position: absolute; top: 50px; width: 264px; max-height: 320px; overflow: auto; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 11px; box-shadow: 0 16px 44px rgba(0,0,0,.55); padding: 8px; z-index: 60; }
    .lmenu[hidden] { display: none; }
    .lmenu .ttl { font-size: 10.5px; color: var(--faint); text-transform: uppercase; letter-spacing: .06em; padding: 4px 8px; }
    .lmenu .li { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 7px; font-size: 13.5px; color: var(--text); }
    .lmenu .li:hover { background: var(--surface-2); }
    .lmenu .li .flag { font-size: 16px; width: 20px; text-align: center; }
    .lmenu .li .ck { margin-left: auto; width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--border-strong); position: relative; }
    .lmenu .li .ck.on { background: var(--accent); border-color: var(--accent); }
    .lmenu .li .ck.on::after { content: "✓"; color: #fff; font-size: 12px; position: absolute; left: 2px; top: -2px; }

    /* ── ONE shared engine-readiness banner, owned by the shell → visible on EVERY view ── */
    .banner { flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 9px 16px;
              background: #231f17; border-bottom: 1px solid #5a4a2a; color: #f1dcae; font-size: 0.82rem; }
    .banner[hidden] { display: none; }
    .banner .spin { width: 14px; height: 14px; flex-shrink: 0; border-radius: 50%; border: 2px solid #6c5a30; border-top-color: var(--warn); animation: spin 0.8s linear infinite; }
    .banner.is-failed .spin { display: none; }
    .banner.is-failed { background: #24131a; border-bottom-color: #6e3140; color: #f6c2c9; }
    .banner .prog { width: 200px; height: 8px; flex-shrink: 0; border-radius: 999px; background: #3a3016; overflow: hidden; border: 1px solid #5a4a2a; }
    .banner .prog > div { height: 100%; background: linear-gradient(90deg, var(--warn), #f3c876); transition: width 0.25s ease; }
    .banner .muted { color: #bda878; }
    .banner .act { margin-left: auto; display: flex; gap: 8px; }
    .banner .act button { background: #2c2616; border-color: #5a4a2a; color: #f1dcae; font-size: 0.76rem; padding: 4px 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── work area: the active feature view mounts here ── */
    .work { flex: 1; min-height: 0; position: relative; display: flex; flex-direction: column; background: var(--bg); }
    .view { flex: 1; min-height: 0; display: none; flex-direction: column; }
    .view.active { display: flex; }

    /* ── shared RunControl bar (same component for every feature) ── */
    .runbar { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 9px 14px;
              background: var(--bg-raised); border-top: 1px solid var(--border); }
    .runbar .controls { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; min-height: 30px; }
    .runbar .controls:empty { display: none; flex: 0; }
    .runbar button.run { display: inline-flex; align-items: center; gap: 7px; padding: 7px 16px; font-size: 0.84rem; border-radius: 8px; }
    .runbar button.run.is-running { background: #3a2026; border-color: #5c3038; color: #f0b9c0; }
    .runbar .status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text); }
    .runbar .status .sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
    .runbar .status[data-running="true"] .sdot { background: var(--ok); }

    /* ── shared toast channel: errors + recovery actions (replaces inline 'Error: '+msg) ── */
    .toast-host { position: fixed; right: 16px; bottom: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 200; }
    .toast { width: 380px; display: flex; gap: 10px; align-items: flex-start;
             background: #24131a; border: 1px solid #6e3140; border-radius: 10px; padding: 12px 12px 12px 14px; box-shadow: 0 16px 40px #0007; }
    .toast.sev-warn { background: #231f17; border-color: #5a4a2a; }
    .toast .ic { color: var(--err); font-size: 1rem; line-height: 1.2; }
    .toast.sev-warn .ic { color: var(--warn); }
    .toast .body { flex: 1; min-width: 0; }
    .toast .ttl { font-size: 0.83rem; color: #f6c2c9; font-weight: 600; }
    .toast.sev-warn .ttl { color: #f1dcae; }
    .toast .msg { font-size: 0.78rem; color: #e8b9c0; margin-top: 2px; word-break: break-word; }
    .toast.sev-warn .msg { color: #ddc596; }
    .toast .row { display: flex; gap: 8px; margin-top: 9px; flex-wrap: wrap; }
    .toast .row button { font-size: 0.76rem; padding: 4px 10px; }
    .toast .x { color: #c98b95; background: none; border: none; font-size: 0.9rem; align-self: flex-start; }

    /* ── Preferences host: categorized window (panes built in prefs.js) ── */
    .prefs-backdrop { position: fixed; inset: 0; background: rgba(4, 6, 10, 0.6); z-index: 150; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .prefs-backdrop[hidden] { display: none; }
    /* Fixed height + internal pane scroll → the panel no longer jumps size per category. */
    .prefs-panel { width: min(720px, 100%); height: min(620px, 88vh); background: var(--surface); border: 1px solid var(--border);
                   border-radius: var(--r-l); box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; overflow: hidden; }
    .prefs-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .prefs-head h2 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text-bright); }
    .prefs-body { display: flex; flex: 1; min-height: 0; }
    .prefs-cats { width: 190px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .prefs-cats button { text-align: left; background: transparent; border: none; color: var(--muted); padding: 7px 10px; border-radius: var(--r-s); font-size: 0.82rem; }
    .prefs-cats button:hover { background: var(--surface-2); color: var(--text); }
    .prefs-cats button.active { background: var(--surface-2); color: var(--text-bright); }
    .prefs-pane { flex: 1; padding: 16px; overflow-y: auto; color: var(--muted); font-size: 0.82rem; }
  </style>
</head>
<body>
  <div class="appbar" x-data="langbar()" x-cloak>
    <div class="brand"><span class="dot"></span>Penguin&nbsp;Translate</div>
    <div class="langbar-inline" id="langBar">
      <span class="you"><span x-text="$store.i18n.t('appbar.speak')"></span>
        <b id="myLangLabel" :title="$store.langs.label($store.langs.my) || $store.i18n.t('appbar.changeMyLang')"
           x-text="$store.langs.abbr($store.langs.my)" @click.stop="openMenu('my', $event)"></b></span>
      <span class="arrow">→</span>
      <div class="set" id="langSet">
        <template x-for="id in $store.langs.others" :key="id">
          <span class="lchip" :title="$store.langs.label(id)">
            <span class="flag" x-text="$store.langs.flag(id)"></span>
            <span x-text="$store.langs.abbr(id)"></span>
            <span class="x" :title="$store.i18n.t('appbar.removeOutput')" @click.stop="$store.langs.removeOther(id)">✕</span>
          </span>
        </template>
        <button type="button" class="add" :title="$store.i18n.t('appbar.addOutput')" @click.stop="openMenu('others', $event)">+</button>
      </div>
    </div>
    <div class="spacer"></div>
    <button type="button" class="ghost" id="btnOverlay" :title="$store.i18n.t('appbar.overlayTitle')"
            :class="{ active: $store.overlay.open || $store.overlay.running }" :data-running="$store.overlay.running"
            @click="$store.overlay.toggle()">🖥 <span x-text="$store.i18n.t('appbar.overlay')"></span></button>
    <div class="account" :title="$store.i18n.t('appbar.account')"><span class="av">M</span> <span id="acctName" x-text="$store.i18n.t('appbar.guest')"></span> <span class="plan" x-text="$store.i18n.t('appbar.planLocal')"></span></div>
    <button type="button" class="gear" id="btnPrefs" :title="$store.i18n.t('appbar.prefs')" @click="$store.prefs.show()">⚙</button>
    <div class="lmenu" id="langMenu" x-ref="menu" :hidden="!menuOpen" @click.outside="closeMenu()">
      <div class="ttl" x-text="menuMode === 'my' ? $store.i18n.t('langmenu.my') : $store.i18n.t('langmenu.others')"></div>
      <template x-for="L in menuItems()" :key="L.id">
        <div class="li" @click="pick(L.id)">
          <span class="flag" x-text="L.flag"></span>
          <span x-text="$store.i18n.langName(L.id, L.label)"></span>
          <span class="ck" :class="{ on: isOn(L.id) }"></span>
        </div>
      </template>
    </div>
  </div>

  <div class="overlaybar" id="overlayBar" x-data hidden :hidden="!$store.overlay.open">
    <template x-if="!$store.overlay.running">
      <div style="display:contents">
        <span class="ob-label">🖥 <span x-text="$store.i18n.t('appbar.overlay')"></span></span>
        <select class="ob-window" :title="$store.i18n.t('overlay.windowTitle')" x-model="$store.overlay.selectedHwnd">
          <template x-for="w in $store.overlay.windows" :key="w.hwnd">
            <option :value="String(w.hwnd)" x-text="w.label || w.title || ('Window ' + w.hwnd)"></option>
          </template>
        </select>
        <button type="button" class="ob-icon ob-refresh" :title="$store.i18n.t('overlay.refresh')" @click="$store.overlay.refreshSetup()">↻</button>
        <span class="ob-hint">→ <span x-text="$store.i18n.langName($store.langs.my)"></span> · <span x-text="$store.i18n.t('overlay.f9')"></span></span>
        <span class="ob-spacer"></span>
        <button type="button" class="ob-start" @click="$store.overlay.start()">▶ <span x-text="$store.i18n.t('overlay.start')"></span></button>
        <button type="button" class="ob-icon ob-close" :title="$store.i18n.t('common.close')" @click="$store.overlay.close()">✕</button>
      </div>
    </template>
    <template x-if="$store.overlay.running">
      <div style="display:contents">
        <span class="ob-live"><span class="dot"></span> <span x-text="$store.i18n.t('overlay.overlaying')"></span> <b x-text="$store.overlay.targetLabel()"></b></span>
        <span class="ob-hint" x-text="$store.i18n.t('overlay.f9')"></span>
        <span class="ob-spacer"></span>
        <button type="button" class="ob-text" @click="$store.overlay.showText = !$store.overlay.showText"><span x-text="($store.overlay.showText ? '▾ ' : '▸ ') + $store.i18n.t('overlay.recognizedText')"></span></button>
        <button type="button" class="ob-change" @click="$store.overlay.change()">⟳ <span x-text="$store.i18n.t('overlay.changeWindow')"></span></button>
        <button type="button" class="ob-stop" @click="$store.overlay.stop()">■ <span x-text="$store.i18n.t('overlay.stop')"></span></button>
        <span class="ob-status" id="ovStatus" x-text="$store.overlay.status"></span>
        <template x-if="$store.overlay.showText">
          <div class="ob-debug">
            <div class="panel"><label x-text="$store.i18n.t('overlay.recognizedText')"></label><textarea id="winOcr" readonly :value="$store.overlay.ocr"></textarea></div>
            <div class="panel"><label x-text="$store.i18n.t('overlay.translation')"></label><textarea id="winEn" readonly :value="$store.overlay.translation"></textarea></div>
          </div>
        </template>
      </div>
    </template>
  </div>

  <div class="banner" id="engineBanner" x-data hidden
       :hidden="$store.engine.hidden" :class="{ 'is-failed': $store.engine.failed }">
    <span class="spin"></span>
    <strong id="bannerTitle"
            x-text="$store.engine.failed ? $store.i18n.t('banner.failed') : ($store.engine.label || $store.i18n.t('banner.preparing'))"></strong>
    <div class="prog" id="bannerProgWrap" x-show="!$store.engine.failed && $store.engine.percent >= 0">
      <div id="bannerProg" :style="'width:' + Math.min(100, Math.max(0, $store.engine.percent || 0)) + '%'"></div>
    </div>
    <span class="muted" id="bannerMsg"
          x-text="$store.engine.failed
            ? ($store.engine.error || $store.engine.label || $store.i18n.t('banner.seeLog'))
            : ($store.engine.installing ? $store.i18n.t('banner.installing') : '')"></span>
    <div class="act" id="bannerActions">
      <template x-if="$store.engine.failed">
        <button @click="$store.engine.retry()" x-text="$store.i18n.t('banner.retry')"></button>
      </template>
      <button @click="$store.engine.openLog()" x-text="$store.i18n.t('banner.openLog')"></button>
    </div>
  </div>

  <main class="work" id="workArea">
    <section class="view view-conversation active" data-view="conversation" x-data>
      <div class="conv-thread" id="convThread" aria-live="polite">
        <template x-if="$store.conversation.empty">
          <div class="conv-empty" id="convEmpty"><div>
            <div class="big" x-text="$store.i18n.t('conv.empty.title')"></div>
            <div x-text="$store.i18n.t('conv.empty.sub')"></div>
          </div></div>
        </template>
        <template x-for="turn in $store.conversation.turns" :key="turn.id">
          <div class="turn" :class="turn.kind">
            <template x-if="turn.kind === 'in'">
              <div style="display:contents">
                <div class="who"><span class="flag" x-text="turn.who.flag"></span> <span x-text="turn.who.label"></span></div>
                <div class="bubble">
                  <template x-if="turn.original"><div class="orig" x-text="turn.original"></div></template>
                  <div class="trans" x-html="turn.transHTML"></div>
                </div>
                <div class="meta" x-text="turn.time"></div>
              </div>
            </template>
            <template x-if="turn.kind === 'out'">
              <div style="display:contents">
                <div class="who"><span class="src" x-text="turn.srcShort"></span> <span x-text="$store.i18n.t('conv.reply')"></span></div>
                <div class="bubble">
                  <div class="orig" x-text="turn.original"></div>
                  <div class="trans-list">
                    <template x-if="turn.pending"><div class="trans-row"><div class="ttext" x-text="$store.i18n.t('conv.translating')"></div></div></template>
                    <template x-for="(r, ri) in turn.rows" :key="ri">
                      <div class="trans-row"><div class="tlang" x-text="r.flag + ' ' + r.label"></div><div class="ttext" x-html="r.textHTML"></div></div>
                    </template>
                  </div>
                </div>
                <div class="meta" x-text="turn.time"></div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </section>
  </main>

  <div class="runbar" id="runBar" x-data>
    <span class="controls" id="runControls">
      <span class="conv-controls">
        <span class="lane lane-mic" :class="{ off: !$store.conversation.lanes.mic.enabled }">
          <button type="button" class="lane-toggle" :title="$store.i18n.t('conv.micToggle')" :aria-pressed="String($store.conversation.lanes.mic.enabled)" @click="$store.conversation.toggleLane('mic')">🎙</button>
          <select class="lane-dev" :title="$store.i18n.t('conv.micDevice')" x-model="$store.conversation.lanes.mic.device" @change="$store.conversation.changeDevice('mic')">
            <template x-for="(d, di) in $store.conversation.lanes.mic.devices" :key="di"><option :value="d.id" x-text="d.label"></option></template>
          </select>
          <span class="lane-meter"><i></i></span>
        </span>
        <span class="lane-sep"></span>
        <span class="lane lane-sys" :class="{ off: !$store.conversation.lanes.sys.enabled }">
          <button type="button" class="lane-toggle" :title="$store.i18n.t('conv.sysToggle')" :aria-pressed="String($store.conversation.lanes.sys.enabled)" @click="$store.conversation.toggleLane('sys')">🎧</button>
          <select class="lane-dev" :title="$store.i18n.t('conv.sysDevice')" x-model="$store.conversation.lanes.sys.device" @change="$store.conversation.changeDevice('sys')">
            <template x-for="(d, di) in $store.conversation.lanes.sys.devices" :key="di"><option :value="d.id" :disabled="d.disabled" x-text="d.label"></option></template>
          </select>
          <span class="lane-meter"><i></i></span>
        </span>
        <span class="conv-composer">
          <input type="text" class="conv-input" :placeholder="$store.i18n.t('conv.composer')" x-model="$store.conversation.composer" @keydown.enter.prevent="$store.conversation.sendComposer($event.target.value); $event.target.value = ''" autocomplete="off" />
        </span>
      </span>
    </span>
    <button type="button" class="run" id="btnRun" :class="$store.conversation.listening ? 'is-running' : 'primary'" @click="$store.conversation.toggleListen()" x-text="$store.conversation.listening ? $store.i18n.t('run.stop') : $store.i18n.t('run.start')">Start</button>
    <div class="status" id="runStatus" :data-running="$store.conversation.listening"><span class="sdot"></span><span id="runStatusText" x-text="$store.conversation.statusText">Idle</span></div>
  </div>

  <div class="toast-host" id="toastHost" x-data>
    <template x-for="tt in $store.toasts.items" :key="tt.id">
      <div class="toast" :class="'sev-' + tt.severity" role="alert">
        <div class="ic">⚠</div>
        <div class="body">
          <div class="ttl" x-text="tt.title || $store.i18n.t('toast.generic')"></div>
          <template x-if="tt.msg"><div class="msg" x-text="tt.msg"></div></template>
          <template x-if="tt.actions && tt.actions.length">
            <div class="row">
              <template x-for="(a, ai) in tt.actions" :key="ai">
                <button :class="{ primary: a.primary }" x-text="a.label" @click="$store.toasts.runAction(tt, a)"></button>
              </template>
            </div>
          </template>
        </div>
        <button class="x" :title="$store.i18n.t('common.dismiss')" @click="$store.toasts.dismiss(tt.id)">✕</button>
      </div>
    </template>
  </div>

  <div class="prefs-backdrop" id="prefsBackdrop" x-data="prefsModal" x-cloak hidden
       :hidden="!s.open" @click.self="s.close()" @keydown.escape.window="s.open && s.close()">
    <div class="prefs-panel" role="dialog" aria-modal="true" aria-labelledby="prefsTitle">
      <div class="prefs-head">
        <h2 id="prefsTitle" x-text="$store.i18n.t('prefs.title')"></h2>
        <button type="button" class="gear" id="btnPrefsClose" :title="$store.i18n.t('common.close')" @click="s.close()">✕</button>
      </div>
      <div class="prefs-body">
        <div class="prefs-cats" id="prefsCats">
          <template x-for="c in s.categories" :key="c.id">
            <button :class="{ active: s.cat === c.id }" :data-cat="c.id" @click="s.select(c.id)"
                    x-text="$store.i18n.t('prefs.cat.' + c.id)"></button>
          </template>
        </div>
        <div class="prefs-pane" id="prefsPane">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            <span class="hint" style="margin:0" x-text="$store.i18n.t('prefs.level.label')"></span>
            <button :style="s.modeBtnStyle(!s.advanced)" @click="s.setAdvanced(false)" x-text="$store.i18n.t('prefs.level.basic')"></button>
            <button :style="s.modeBtnStyle(s.advanced)" @click="s.setAdvanced(true)" x-text="$store.i18n.t('prefs.level.advanced')"></button>
          </div>

          <template x-if="s.cat === 'languages'">
            <div>
              <p class="hint" x-text="$store.i18n.t('prefs.lang.intro')"></p>
              <div class="field">
                <label x-text="$store.i18n.t('prefs.lang.your')"></label>
                <select @change="$store.langs.pickMy($event.target.value)">
                  <template x-for="l in $store.langs.catalog" :key="l.id">
                    <option :value="l.id" :selected="l.id === $store.langs.my" x-text="(l.flag || '') + ' ' + $store.i18n.langName(l.id, l.label)"></option>
                  </template>
                </select>
              </div>
              <div class="field">
                <label x-text="$store.i18n.t('prefs.lang.others')"></label>
                <template x-for="l in $store.langs.catalog.filter(x => x.id !== $store.langs.my)" :key="l.id">
                  <label class="line">
                    <input type="checkbox" :checked="$store.langs.others.includes(l.id)" @change="$store.langs.toggleOther(l.id)">
                    <span x-text="' ' + (l.flag || '') + ' ' + $store.i18n.langName(l.id, l.label) + (l.reading_aid && l.reading_aid !== 'none' ? ' · ' + l.reading_aid : '')"></span>
                  </label>
                </template>
              </div>
            </div>
          </template>

          <template x-if="s.cat === 'inference'">
            <div>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.inf.sourceLegend')"></legend>
                <label class="line" style="opacity:.55"><input type="radio" disabled> <span x-text="' ' + $store.i18n.t('prefs.inf.managed')"></span></label>
                <p class="hint" x-text="$store.i18n.t('prefs.inf.byok')"></p>
                <div class="field">
                  <label x-text="$store.i18n.t('prefs.inf.provider')"></label>
                  <select @change="s.save({ practice: { api_provider: $event.target.value } })">
                    <template x-for="o in s.providerOpts" :key="o.v"><option :value="o.v" :selected="o.v === (practice.api_provider || 'openrouter')" x-text="o.t"></option></template>
                  </select>
                </div>
              </fieldset>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.inf.keysLegend')"></legend>
                <div class="field">
                  <label x-text="$store.i18n.t('prefs.inf.openaiKey')"></label>
                  <div class="key-row">
                    <input type="text" autocomplete="off" spellcheck="false" placeholder="sk-…" :value="settings.openai_api_key || ''" @change="s.save({ openai_api_key: $event.target.value.trim() })">
                    <button class="key-remove" @click="s.removeKey('openai')" x-text="$store.i18n.t('common.remove')"></button>
                  </div>
                </div>
                <div class="field">
                  <label x-text="$store.i18n.t('prefs.inf.openrouterKey')"></label>
                  <div class="key-row">
                    <input type="text" autocomplete="off" spellcheck="false" placeholder="sk-or-…" :value="settings.openrouter_api_key || ''" @change="s.save({ openrouter_api_key: $event.target.value.trim() })">
                    <button class="key-remove" @click="s.removeKey('openrouter')" x-text="$store.i18n.t('common.remove')"></button>
                  </div>
                </div>
              </fieldset>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.inf.modelsLegend')"></legend>
                <div class="field">
                  <label x-text="$store.i18n.t('prefs.inf.asr')"></label>
                  <select @change="s.save({ practice: { transcribe_model: $event.target.value } })">
                    <template x-for="o in s.opts(s.TRANSCRIBE, practice.transcribe_model)" :key="o.v"><option :value="o.v" :selected="o.v === (practice.transcribe_model || s.TRANSCRIBE[0].v)" x-text="o.t"></option></template>
                  </select>
                </div>
                <div class="field">
                  <label x-text="$store.i18n.t('prefs.inf.translation')"></label>
                  <select @change="s.save({ practice: { translate_model: $event.target.value } })">
                    <template x-for="o in s.opts(s.TRANSLATE, practice.translate_model)" :key="o.v"><option :value="o.v" :selected="o.v === (practice.translate_model || s.TRANSLATE[0].v)" x-text="o.t"></option></template>
                  </select>
                </div>
              </fieldset>
              <template x-if="s.advanced">
                <div>
                  <fieldset>
                    <legend x-text="$store.i18n.t('prefs.inf.pipelineLegend')"></legend>
                    <div class="field">
                      <label x-text="$store.i18n.t('prefs.inf.mode')"></label>
                      <select @change="s.save({ practice: { pipeline_mode: $event.target.value } })">
                        <template x-for="o in s.pipelineOpts" :key="o.v"><option :value="o.v" :selected="o.v === (practice.pipeline_mode || 'split')" x-text="o.t"></option></template>
                      </select>
                    </div>
                    <div class="field">
                      <label x-text="$store.i18n.t('prefs.inf.multimodal')"></label>
                      <select @change="s.save({ practice: { multimodal_model: $event.target.value } })">
                        <template x-for="o in s.opts(s.MULTIMODAL, practice.multimodal_model)" :key="o.v"><option :value="o.v" :selected="o.v === (practice.multimodal_model || s.MULTIMODAL[0].v)" x-text="o.t"></option></template>
                      </select>
                    </div>
                    <div class="field">
                      <label x-text="$store.i18n.t('prefs.inf.back')"></label>
                      <select @change="s.save({ practice: { backtranslate: $event.target.value } })">
                        <template x-for="o in s.backOpts" :key="o.v"><option :value="o.v" :selected="o.v === (practice.backtranslate || 'none')" x-text="o.t"></option></template>
                      </select>
                    </div>
                  </fieldset>
                  <fieldset>
                    <legend x-text="$store.i18n.t('prefs.inf.gpuLegend')"></legend>
                    <p class="hint" x-text="$store.i18n.t('prefs.inf.gpuHint')"></p>
                    <div class="field">
                      <label x-text="$store.i18n.t('prefs.inf.whisperGpu')"></label>
                      <select @change="s.save({ practice: { whisper_gpu: $event.target.value } })">
                        <template x-for="o in s.gpuOpts" :key="o.v"><option :value="o.v" :selected="o.v === (practice.whisper_gpu || '')" x-text="o.t"></option></template>
                      </select>
                    </div>
                    <div class="field">
                      <label x-text="$store.i18n.t('prefs.inf.nllbGpu')"></label>
                      <select @change="s.save({ practice: { nllb_gpu: $event.target.value } })">
                        <template x-for="o in s.gpuOpts" :key="o.v"><option :value="o.v" :selected="o.v === (practice.nllb_gpu || '')" x-text="o.t"></option></template>
                      </select>
                    </div>
                    <div class="field"><button @click="s.loadModels()" x-text="s.loadBtnBusy ? $store.i18n.t('common.loading') : $store.i18n.t('prefs.inf.loadModels')"></button></div>
                  </fieldset>
                </div>
              </template>
            </div>
          </template>

          <template x-if="s.cat === 'capture'">
            <div>
              <p class="hint" x-text="$store.i18n.t('prefs.cap.intro')"></p>
              <label class="line"><input type="checkbox" :checked="audio.diarize_by_default" @change="s.saveAudio({ diarize_by_default: $event.target.checked })"> <span x-text="' ' + $store.i18n.t('prefs.cap.diarize')"></span></label>
              <div class="field">
                <label x-text="$store.i18n.t('prefs.cap.detect')"></label>
                <select @change="s.saveAudio({ speech_detection: $event.target.value })">
                  <template x-for="o in s.detectOpts" :key="o.v"><option :value="o.v" :selected="o.v === (audio.speech_detection || 'streaming')" x-text="o.t"></option></template>
                </select>
                <p class="hint" x-text="$store.i18n.t('prefs.cap.detectHint')"></p>
              </div>
              <div class="field">
                <label x-text="$store.i18n.t('prefs.cap.threshold')"></label>
                <div class="vad-meter">
                  <div style="position:relative;height:26px;border-radius:6px;background:var(--bg);border:1px solid var(--border);overflow:hidden">
                    <div class="vad-fill" style="position:absolute;left:0;top:0;bottom:0;width:0;background:var(--faint)"></div>
                    <div class="vad-mark" style="position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--accent);left:15%"></div>
                  </div>
                  <input type="range" min="1" max="100" step="1" style="width:100%;margin-top:8px" :value="Number(audio.vad_sensitivity) || 15" @change="s.saveAudio({ vad_sensitivity: Number($event.target.value) })">
                  <div style="margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                    <span class="mic-dot" style="width:9px;height:9px;border-radius:50%;background:var(--faint);display:inline-block;flex:none"></span>
                    <span class="hint mic-label" style="margin:0"></span>
                    <span class="hint vad-note" style="margin-left:10px" x-text="$store.i18n.t('prefs.cap.speakNote')"></span>
                  </div>
                </div>
                <p class="hint" x-text="$store.i18n.t('prefs.cap.thresholdHint')"></p>
              </div>
              <div class="field"><label x-text="$store.i18n.t('prefs.cap.maxClip')"></label><input type="range" min="1" max="45" step="0.5" :value="audio.clip_max_sec || 3.5" @change="s.saveAudio({ clip_max_sec: Number($event.target.value) })"></div>
              <div class="field"><label x-text="$store.i18n.t('prefs.cap.timeout')"></label><input type="number" min="2" max="120" :value="audio.segment_timeout_sec || 5" @change="s.saveAudio({ segment_timeout_sec: Number($event.target.value) || 5 })"></div>
            </div>
          </template>

          <template x-if="s.cat === 'overlays'">
            <div>
              <p class="hint" x-text="$store.i18n.t('prefs.ov.intro')"></p>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.ov.desktopLegend')"></legend>
                <label class="line"><input type="checkbox" :checked="audio.desktop_overlay_enabled" @change="s.toggleDesktopOverlay($event.target.checked)"> <span x-text="' ' + $store.i18n.t('prefs.ov.showDesktop')"></span></label>
                <div class="field"><label x-text="$store.i18n.t('prefs.ov.stripWidth')"></label><input type="number" min="480" max="3840" step="10" :value="audio.desktop_overlay_width || 1280" @change="s.saveAudio({ desktop_overlay_width: Number($event.target.value) || 1280 })"></div>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.ov.fontScale')"></label><input type="number" min="0.5" max="2" step="0.05" :value="audio.desktop_overlay_font_scale || 1" @change="s.saveAudio({ desktop_overlay_font_scale: Number($event.target.value) || 1 })"></div></template>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.ov.hPos')"></label><select @change="s.saveAudio({ desktop_overlay_align: $event.target.value })"><template x-for="o in s.alignOpts" :key="o.v"><option :value="o.v" :selected="o.v === (audio.desktop_overlay_align || 'center')" x-text="o.t"></option></template></select></div></template>
              </fieldset>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.ov.vrLegend')"></legend>
                <label class="line"><input type="checkbox" :checked="audio.openvr_overlay_enabled" @change="s.toggleVrOverlay($event.target.checked)"> <span x-text="' ' + $store.i18n.t('prefs.ov.showVr')"></span></label>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.ov.panelWidth')"></label><input type="number" min="0.4" max="4" step="0.1" :value="audio.vr_overlay_width_m || 1.6" @change="s.saveAudio({ vr_overlay_width_m: Number($event.target.value) || 1.6 })"></div></template>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.ov.distance')"></label><input type="number" min="0.5" max="5" step="0.1" :value="audio.vr_overlay_distance_m || 1.8" @change="s.saveAudio({ vr_overlay_distance_m: Number($event.target.value) || 1.8 })"></div></template>
              </fieldset>
            </div>
          </template>

          <template x-if="s.cat === 'integrations'">
            <div>
              <p class="hint" x-text="$store.i18n.t('prefs.int.intro')"></p>
              <fieldset>
                <legend x-text="$store.i18n.t('prefs.int.legend')"></legend>
                <label class="line"><input type="checkbox" :checked="osc.enabled" @change="osc.enabled = $event.target.checked; s.saveOsc()"> <span x-text="' ' + $store.i18n.t('prefs.int.enable')"></span></label>
                <label class="line"><input type="checkbox" :checked="osc.include_original" @change="osc.include_original = $event.target.checked; s.saveOsc()"> <span x-text="' ' + $store.i18n.t('prefs.int.includeOriginal')"></span></label>
                <label class="line"><input type="checkbox" :checked="osc.notification" @change="osc.notification = $event.target.checked; s.saveOsc()"> <span x-text="' ' + $store.i18n.t('prefs.int.notification')"></span></label>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.int.host')"></label><input type="text" autocomplete="off" spellcheck="false" :value="osc.host" @change="osc.host = $event.target.value.trim() || '127.0.0.1'; s.saveOsc()"></div></template>
                <template x-if="s.advanced"><div class="field"><label x-text="$store.i18n.t('prefs.int.port')"></label><input type="number" min="1" max="65535" :value="osc.port" @change="osc.port = Number($event.target.value) || 9000; s.saveOsc()"></div></template>
                <div class="field"><button :disabled="!osc.enabled" :title="osc.enabled ? $store.i18n.t('prefs.int.testTitleOn') : $store.i18n.t('prefs.int.testTitleOff')" @click="s.sendOscTest()" x-text="$store.i18n.t('prefs.int.sendTest')"></button></div>
              </fieldset>
            </div>
          </template>

          <template x-if="s.cat === 'diagnostics'">
            <div>
              <p class="hint" x-text="$store.i18n.t('prefs.diag.enginePhase', { phase: $store.engine.phase + ($store.engine.label ? ' — ' + $store.engine.label : '') })"></p>
              <p class="hint" x-text="s.diag.line"></p>
              <pre class="tail" style="max-height:240px;overflow:auto;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;font:12px/1.35 ui-monospace,Consolas,monospace;white-space:pre-wrap;margin:8px 0" x-text="s.diag.tail"></pre>
              <div class="field"><button @click="s.refreshDiag()" x-text="$store.i18n.t('prefs.diag.refresh')"></button></div>
              <template x-if="s.advanced">
                <fieldset>
                  <legend x-text="$store.i18n.t('prefs.diag.latencyLegend')"></legend>
                  <p class="hint" x-text="$store.i18n.t('prefs.diag.latencyHint')"></p>
                  <iframe :title="$store.i18n.t('prefs.diag.latencyLegend')" src="/ui/overlay-timings.html" loading="lazy" style="width:100%;height:460px;border:1px solid var(--border);border-radius:8px;background:var(--bg)"></iframe>
                </fieldset>
              </template>
            </div>
          </template>

          <div class="hint" aria-live="polite" :class="{ 'is-error': s.statusErr }" style="margin-top:10px;min-height:1.2em" x-text="s.status"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
